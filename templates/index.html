<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>App Natação</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <main class="container">

        <div class="card">

            <h1>Cadastro de Treino</h1>

            <form action="/salvar" method="POST">

                <input type="date" name="data_treino" required>

                <input 
                    type="text" 
                    name="titulo" 
                    placeholder="Título do treino"
                    required
                >

                <label>Tipo de treino</label>

                <select name="estilo">

                    <option value="Crawl">Crawl</option>
                    <option value="Costas">Costas</option>
                    <option value="Peito">Peito</option>
                    <option value="Borboleta">Borboleta</option>
                    <option value="Medley">Medley</option>

                    <option value="Educativo">Educativo</option>
                    <option value="Pernada">Pernada</option>
                    <option value="Braçada">Braçada</option>
                    <option value="Técnica">Técnica</option>

                </select>

                <label>Tamanho da piscina</label>

                <select name="tamanho_piscina">

                    <option value="12.5">12.5m</option>
                    <option value="25">25m</option>
                    <option value="50">50m</option>

                </select>

                <label>Número de voltas</label>

                <input 
                    type="number" 
                    name="voltas"
                    placeholder="Quantidade de voltas"
                    required
                >

                <label>Equipamentos</label>

                <div class="equipamentos">

                    <label>
                        <input type="checkbox" name="equipamentos" value="Palmar">
                        Palmar
                    </label>

                    <label>
                        <input type="checkbox" name="equipamentos" value="Pullbuoy">
                        Pullbuoy
                    </label>

                    <label>
                        <input type="checkbox" name="equipamentos" value="Prancha">
                        Prancha
                    </label>

                    <label>
                        <input type="checkbox" name="equipamentos" value="Pé de pato">
                        Pé de pato
                    </label>

                </div>

                <input 
                    type="number" 
                    name="duracao_minutos"
                    placeholder="Duração em minutos"
                    required
                >

                <textarea 
                    name="observacoes"
                    placeholder="Observações"
                ></textarea>

                <button type="submit">
                    Salvar treino
                </button>

            </form>

        </div>

    </main>

</body>
</html>
